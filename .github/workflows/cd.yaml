name: CD

on:
  push:
    branches: ["main"]       # production deploy
    tags: ["v*"]             # explicit version tags also trigger

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/pydevrepo/ol-service
  GKE_CLUSTER: ol-cluster
  GKE_REGION: us-central1

jobs:
  # ── Job 1: Run CI first — never deploy if tests fail ──────────────────────
  test:
    name: Run tests before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run unit tests
        env:
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost:5432/test_db"
          CUSTOMER_SERVICE_URL: "http://customer-service.test.svc.cluster.local"
          API_KEY: "test-api-key-for-ci"
          ENVIRONMENT: "local"
        run: pytest tests/unit/ -v

  # ── Job 2: Build and push Docker image ────────────────────────────────────
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Extract image metadata (tag, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to production (main branch only) ───────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production  # requires manual approval in GitHub Environments

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Verify kubectl context is production
        run: |
          CONTEXT=$(kubectl config current-context)
          echo "Deploying to context: $CONTEXT"
          if [[ "$CONTEXT" != *"production"* ]]; then
            echo "ERROR: Expected production context, got: $CONTEXT"
            exit 1
          fi

      - name: Update deployment image tag
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
          kubectl set image deployment/ol-service \
            ol-service=${{ env.IMAGE }}:${IMAGE_TAG} \
            -n production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ol-service \
            -n production \
            --timeout=3m

      - name: Smoke test
        run: |
          POD=$(kubectl get pod -n production -l app=ol-service \
            -o jsonpath='{.items[0].metadata.name}')
          RESULT=$(kubectl exec -n production "$POD" -c ol-service -- \
            python3 -c "import urllib.request,json; print(json.loads(urllib.request.urlopen('http://localhost:8000/health').read())['status'])")
          echo "Health status: $RESULT"
          test "$RESULT" = "ok"

      - name: Notify on failure — rollback
        if: failure()
        run: |
          echo "Deployment failed — rolling back"
          kubectl rollout undo deployment/ol-service -n production
          kubectl rollout status deployment/ol-service -n production --timeout=2m

  # ── Job 4: Deploy to staging (staging branch) ────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/staging'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Update deployment image tag
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
          kubectl set image deployment/ol-service \
            ol-service=${{ env.IMAGE }}:${IMAGE_TAG} \
            -n staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ol-service \
            -n staging \
            --timeout=3m
