name: CD

# Triggered when a release/* branch is pushed.
# Flow: test → build → deploy production (manual gate) → merge release/* → main → tag.
on:
  push:
    branches: ["release/*"]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/pydevrepo/customer-service-pi
  GKE_CLUSTER: ol-cluster
  GKE_REGION: us-central1

jobs:
  # ── Job 1: Run CI first — never deploy if tests fail ──────────────────────
  test:
    name: Run tests before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run unit tests
        env:
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost:5432/test_db"
          CUSTOMER_SERVICE_URL: "http://customer-service.test.svc.cluster.local"
          API_KEY: "test-api-key-for-ci"
          ENVIRONMENT: "local"
        run: pytest tests/unit/ -v

  # ── Job 2: Build and push Docker image ────────────────────────────────────
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.deploy_tag.outputs.value }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Derive the deploy tag from release branch + datetime:
      #   <VERSION>-<MMDDYYYYHHMMSS>   e.g.  v1.2.0-04272026135730
      # VERSION comes from the release/* branch name (the 'v' prefix is
      # part of the branch convention, e.g. release/v1.2.0).
      # NOTE: MMDDYYYY is not lexicographically sortable — chosen by request.
      - name: Set deploy tag
        id: deploy_tag
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          DATE=$(date -u +%m%d%Y%H%M%S)
          echo "value=${VERSION}-${DATE}" >> $GITHUB_OUTPUT

      - name: Extract image metadata (tag, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.deploy_tag.outputs.value }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production  # requires manual approval in GitHub Environments

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Verify kubectl context is production
        run: |
          CONTEXT=$(kubectl config current-context)
          echo "Deploying to context: $CONTEXT"
          if [[ "$CONTEXT" != *"ol-cluster"* ]]; then
            echo "ERROR: Expected ol-cluster context, got: $CONTEXT"
            exit 1
          fi

      # Run alembic migrations BEFORE rolling out new code. If migrations
      # fail, the workflow fails here and the running pods keep serving the
      # previous image. Safe for additive migrations only — destructive
      # changes need a two-phase deploy (out of scope here).
      - name: Run database migrations
        env:
          IMAGE_FULL: ${{ env.IMAGE }}:${{ needs.build-push.outputs.image_tag }}
        run: |
          set -euo pipefail
          JOB_NAME=$(envsubst < k8s/migrate-job.yaml \
            | kubectl create -f - -o jsonpath='{.metadata.name}')
          echo "Created migration job: $JOB_NAME"

          # Wait for completion. backoffLimit=0 means a failed pod marks the
          # Job Failed immediately; --for=condition=complete then times out.
          if ! kubectl wait --for=condition=complete -n production \
              "job/$JOB_NAME" --timeout=2m; then
            echo "::error::Migration job did not complete successfully"
            kubectl describe -n production "job/$JOB_NAME" || true
            kubectl logs -n production "job/$JOB_NAME" --all-containers=true --tail=200 || true
            exit 1
          fi

          echo "Migration logs:"
          kubectl logs -n production "job/$JOB_NAME" -c alembic

      - name: Update deployment image tag
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
          kubectl set image deployment/customer-service-pi \
            customer-service-pi=${{ env.IMAGE }}:${IMAGE_TAG} \
            -n production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/customer-service-pi \
            -n production \
            --timeout=3m

      - name: Smoke test
        run: |
          kubectl wait pod -n production -l app=customer-service-pi \
            --for=condition=Ready --timeout=60s
          POD=$(kubectl get pod -n production -l app=customer-service-pi \
            --field-selector=status.phase=Running \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}')
          echo "Selected pod: $POD"
          RESULT=$(kubectl exec -n production "$POD" -c customer-service-pi -- \
            python3 -c "import urllib.request,json; print(json.loads(urllib.request.urlopen('http://localhost:8000/health').read())['status'])")
          echo "Health status: $RESULT"
          test "$RESULT" = "ok"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — attempting rollback"
          # Skip rollback for a brand-new Deployment with no history
          # (e.g. first deploy after a rename). `kubectl rollout undo`
          # exits 1 in that case, which would mask the real failure.
          REVS=$(kubectl rollout history deployment/customer-service-pi \
            -n production --revision=0 2>/dev/null | grep -cE '^[0-9]+' || echo 0)
          if [ "$REVS" -lt 2 ]; then
            echo "No prior revision to roll back to (history=$REVS) — skipping undo"
            exit 0
          fi
          kubectl rollout undo deployment/customer-service-pi -n production
          kubectl rollout status deployment/customer-service-pi -n production --timeout=2m

  # ── Job 4: Merge release branch → main and create version tag ─────────────
  merge-to-main:
    name: Merge release to main and tag
    runs-on: ubuntu-latest
    needs: deploy-production

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Merge release branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-ff origin/${{ steps.version.outputs.branch }} \
            -m "chore: merge ${{ steps.version.outputs.branch }} into main"
          git push origin main

      - name: Create version tag on main
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
