name: CD

# Triggered when a release/* branch is pushed.
# Flow: test → build → deploy production (manual gate) → merge release/* → main → tag.
on:
  push:
    branches: ["release/*"]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/pydevrepo/ol-service
  GKE_CLUSTER: ol-cluster
  GKE_REGION: us-central1

jobs:
  # ── Job 1: Run CI first — never deploy if tests fail ──────────────────────
  test:
    name: Run tests before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run unit tests
        env:
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost:5432/test_db"
          CUSTOMER_SERVICE_URL: "http://customer-service.test.svc.cluster.local"
          API_KEY: "test-api-key-for-ci"
          ENVIRONMENT: "local"
        run: pytest tests/unit/ -v

  # ── Job 2: Build and push Docker image ────────────────────────────────────
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.deploy_tag.outputs.value }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Extract image metadata (tag, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      # Derive the SHA tag explicitly — docker/metadata-action outputs.version
      # returns the branch name for branch pushes, not the sha tag.
      # A unique sha tag guarantees kubectl set image triggers a rollout.
      - name: Set deploy tag
        id: deploy_tag
        run: echo "value=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production  # requires manual approval in GitHub Environments

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Verify kubectl context is production
        run: |
          CONTEXT=$(kubectl config current-context)
          echo "Deploying to context: $CONTEXT"
          if [[ "$CONTEXT" != *"ol-cluster"* ]]; then
            echo "ERROR: Expected ol-cluster context, got: $CONTEXT"
            exit 1
          fi

      - name: Update deployment image tag
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
          kubectl set image deployment/ol-service \
            ol-service=${{ env.IMAGE }}:${IMAGE_TAG} \
            -n production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ol-service \
            -n production \
            --timeout=3m

      - name: Smoke test
        run: |
          kubectl wait pod -n production -l app=ol-service \
            --for=condition=Ready --timeout=60s
          POD=$(kubectl get pod -n production -l app=ol-service \
            --field-selector=status.phase=Running \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}')
          echo "Selected pod: $POD"
          RESULT=$(kubectl exec -n production "$POD" -c ol-service -- \
            python3 -c "import urllib.request,json; print(json.loads(urllib.request.urlopen('http://localhost:8000/health').read())['status'])")
          echo "Health status: $RESULT"
          test "$RESULT" = "ok"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back"
          kubectl rollout undo deployment/ol-service -n production
          kubectl rollout status deployment/ol-service -n production --timeout=2m

  # ── Job 4: Merge release branch → main and create version tag ─────────────
  merge-to-main:
    name: Merge release to main and tag
    runs-on: ubuntu-latest
    needs: deploy-production

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Merge release branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-ff origin/${{ steps.version.outputs.branch }} \
            -m "chore: merge ${{ steps.version.outputs.branch }} into main"
          git push origin main

      - name: Create version tag on main
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
