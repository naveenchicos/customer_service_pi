apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: ol-gateway-class
spec:
  controllerName: networking.gke.io/gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ol-gateway
  namespace: production
  annotations:
    networking.gke.io/certmap: ol-cert-map  # managed TLS via Certificate Manager
spec:
  gatewayClassName: ol-gateway-class
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        options:
          networking.gke.io/pre-shared-certs: ol-tls-cert
    - name: http   # redirect HTTP → HTTPS at the load balancer level
      protocol: HTTP
      port: 80
