apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: customer-service-pi-pdb
  namespace: production
spec:
  # With HPA min=1 max=3 and deployment maxSurge=1/maxUnavailable=0, rolling
  # updates always bring up a new pod before terminating the old. This PDB
  # guards voluntary disruptions (node drains, cluster maintenance) so at
  # least one pod stays Ready throughout.
  minAvailable: 1
  selector:
    matchLabels:
      app: customer-service-pi
