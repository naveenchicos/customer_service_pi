apiVersion: v1
kind: Service
metadata:
  name: ol-service
  namespace: production
  labels:
    app: ol-service
spec:
  type: ClusterIP
  selector:
    app: ol-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
---
# Canary service — points to pods labelled track: canary
# Set weight in httproute.yaml to 0 when no canary is active
apiVersion: v1
kind: Service
metadata:
  name: ol-service-canary
  namespace: production
  labels:
    app: ol-service
    track: canary
spec:
  type: ClusterIP
  selector:
    app: ol-service
    track: canary
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
