apiVersion: v1
kind: Service
metadata:
  name: customer-service-pi
  namespace: production
  labels:
    app: customer-service-pi
spec:
  type: ClusterIP
  selector:
    app: customer-service-pi
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
---
# Canary service — points to pods labelled track: canary
# Set weight in httproute.yaml to 0 when no canary is active
apiVersion: v1
kind: Service
metadata:
  name: customer-service-pi-canary
  namespace: production
  labels:
    app: customer-service-pi
    track: canary
spec:
  type: ClusterIP
  selector:
    app: customer-service-pi
    track: canary
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
