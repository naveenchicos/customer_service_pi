apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ol-service-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ol-service
  minReplicas: 3   # never drop below 3; matches PodDisruptionBudget minAvailable
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60  # scale up when average CPU exceeds 60%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60   # avoid thrashing during short spikes
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
